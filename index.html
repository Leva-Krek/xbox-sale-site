<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Xbox Sale</title>
<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    margin: 0;
    padding: 0;
}

header {
    background: #1f1f1f;
    padding: 20px;
    text-align: center;
    font-size: 28px;
}

.banner {
    text-align: center;
    margin: 20px;
}

.banner img {
    max-width: 90%;
    border-radius: 10px;
}

.games {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1e1e1e;
    border-radius: 12px;
    padding: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    margin-top: 10px;
    font-size: 18px;
}

.discount {
    color: #00ff88;
    font-weight: bold;
}
</style>
</head>
<body>

<header>
Xbox Распродажа
</header>

<div class="banner">
<img src="BANNER_LINK" alt="Sale Banner">
</div>

<div class="games">
GAME_BLOCK
</div>

</body>
</html>
