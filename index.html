<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Каталог игр Xbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <h1>Игры Xbox со скидкой</h1>
  <div class="filters">
    <input type="text" id="search" placeholder="Поиск по названию">
    <select id="platformFilter">
      <option value="">Все платформы</option>
      <option value="XboxOne">Xbox One</option>
      <option value="XboxSeriesX">Xbox Series X</option>
    </select>
    <select id="sort">
      <option value="discount">Сначала большие скидки</option>
      <option value="cheap">Сначала дешёвые</option>
      <option value="expensive">Сначала дорогие</option>
      <option value="rating">По рейтингу</option>
    </select>
    <label><input type="checkbox" id="onlyDiscount"> Только со скидкой</label>
  </div>
</header>

<main>
  <div id="games" class="grid"></div>
  <div id="pagination" class="pagination"></div>
</main>

<script src="catalog.js"></script>
</body>
</html>
